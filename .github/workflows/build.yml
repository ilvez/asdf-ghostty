name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

# TODO: remove once mlugg/setup-zig updates to node24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  plugin_test:
    name: asdf plugin test
    strategy:
      matrix:
        os:
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: install zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: install ghostty dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libadwaita-1-dev gettext libxml2-utils minisign
      - name: run plugin test
        uses: asdf-vm/actions/plugin-test@v4
        with:
          command: ghostty --version
        env:
          GHOSTTY_BUILD_OPTIONS: "-Demit-themes=false -fno-sys=gtk4-layer-shell"
